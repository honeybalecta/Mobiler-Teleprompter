<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Teleprompter</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow: hidden; }

  /* Setup Screen */
  #setup {
    position: fixed; inset: 0; padding: 20px;
    display: flex; flex-direction: column; gap: 14px;
    background: #0e0e0e; overflow-y: auto;
  }
  #setup h1 { font-size: 22px; margin-bottom: 4px; }
  #setup label { font-size: 13px; color: #aaa; display: block; margin-bottom: 6px; }
  #setup textarea {
    width: 100%; min-height: 220px; padding: 12px;
    background: #1a1a1a; color: #fff; border: 1px solid #333;
    border-radius: 8px; font-size: 16px; resize: vertical; font-family: inherit;
  }
  .row { display: flex; gap: 10px; align-items: center; }
  .row label { margin: 0; flex: 0 0 auto; }
  .slider-wrap { flex: 1; display: flex; gap: 10px; align-items: center; }
  input[type=range] { flex: 1; }
  input[type=number], select {
    background: #1a1a1a; color: #fff; border: 1px solid #333;
    border-radius: 6px; padding: 8px; font-size: 15px;
  }
  .btn {
    padding: 14px 20px; border-radius: 10px; border: none;
    font-size: 16px; font-weight: 600; cursor: pointer;
    background: #e53935; color: #fff;
  }
  .btn.secondary { background: #333; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Prompter Screen */
  #prompter {
    position: fixed; inset: 0; display: none;
    background: #000;
  }
  #video {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1) translateZ(0); /* Spiegeln + GPU-Layer */
    will-change: transform;
    backface-visibility: hidden;
  }
  #video.back { transform: translateZ(0); }

  #textOverlay {
    position: absolute; left: 0; right: 0; top: 15%; bottom: 25%;
    overflow: hidden; pointer-events: none;
    background: rgba(0,0,0,0.35);
  }
  /* Günstige Fade-Kanten statt mask-image (mobile Compositor-freundlich) */
  #textOverlay::before, #textOverlay::after {
    content: ''; position: absolute; left: 0; right: 0; height: 40px;
    pointer-events: none; z-index: 2;
  }
  #textOverlay::before {
    top: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.35), transparent);
  }
  #textOverlay::after {
    bottom: 0; background: linear-gradient(to top, rgba(0,0,0,0.35), transparent);
  }
  #textScroll {
    position: absolute; left: 0; right: 0;
    padding: 0 24px;
    font-size: 28px; line-height: 1.5;
    font-weight: 600;
    text-shadow: 0 2px 6px rgba(0,0,0,0.9);
    white-space: pre-wrap;
    will-change: transform;
    transform: translate3d(0, 0, 0);
    backface-visibility: hidden;
  }
  #readingLine {
    position: absolute; left: 0; right: 0; top: 50%;
    height: 2px; background: rgba(255, 59, 48, 0.6);
    pointer-events: none;
  }

  /* Controls */
  #topBar {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 12px 16px; display: flex; justify-content: space-between;
    align-items: center; z-index: 10;
    background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
  }
  #segCount { font-size: 13px; color: #fff; }
  #recDot {
    display: inline-block; width: 10px; height: 10px;
    border-radius: 50%; background: #e53935; margin-right: 6px;
    animation: pulse 1s infinite; visibility: hidden;
  }
  #recDot.active { visibility: visible; }
  @keyframes pulse { 50% { opacity: 0.3; } }

  #bottomBar {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 18px 16px 28px; z-index: 10;
    background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
    display: flex; flex-direction: column; gap: 12px;
  }
  .speed-row {
    display: flex; align-items: center; gap: 10px;
    color: #fff; font-size: 13px;
  }
  .btn-row { display: flex; gap: 10px; justify-content: center; }
  .ctrl {
    flex: 1; padding: 14px; border-radius: 10px; border: none;
    font-size: 15px; font-weight: 600; cursor: pointer;
    background: rgba(40,40,40,0.85); color: #fff;
  }
  .ctrl.rec { background: #e53935; }
  .ctrl.stop { background: #555; }
  .ctrl.del { background: rgba(229, 57, 53, 0.4); }
  .ctrl:disabled { opacity: 0.4; }

  #finish {
    position: fixed; inset: 0; display: none; flex-direction: column;
    background: #0e0e0e; padding: 20px; gap: 14px; overflow-y: auto;
  }
  #finish video { width: 100%; border-radius: 8px; background: #000; }
  .info { font-size: 13px; color: #888; }
</style>
</head>
<body>

<!-- ===== SETUP ===== -->
<div id="setup">
  <h1>📝 Teleprompter</h1>
  <div>
    <label>Text zum Einsprechen</label>
    <textarea id="scriptText" placeholder="Hier deinen Text einfügen…"></textarea>
  </div>
  <div class="row">
    <label>Kamera:</label>
    <select id="camSelect">
      <option value="user">Front</option>
      <option value="environment">Rück</option>
    </select>
  </div>
  <div class="row">
    <label>Schriftgröße:</label>
    <div class="slider-wrap">
      <input type="range" id="fontSize" min="18" max="48" value="28">
      <span id="fontSizeVal">28 px</span>
    </div>
  </div>
  <div class="row">
    <label>Start-Tempo:</label>
    <div class="slider-wrap">
      <input type="range" id="startSpeed" min="10" max="120" value="40">
      <span id="startSpeedVal">40 px/s</span>
    </div>
  </div>
  <button class="btn" id="startBtn">Teleprompter starten</button>
  <p class="info">Tipp: Tempo kannst du während der Aufnahme jederzeit anpassen. Nach „Pause" kannst du das letzte Segment verwerfen und die Stelle neu einsprechen — der Text springt automatisch zurück.</p>
</div>

<!-- ===== PROMPTER ===== -->
<div id="prompter">
  <video id="video" autoplay playsinline muted></video>
  <div id="textOverlay">
    <div id="textScroll"></div>
  </div>
  <div id="readingLine"></div>

  <div id="topBar">
    <div><span id="recDot"></span><span id="segCount">0 Segmente</span></div>
    <button class="ctrl" id="backBtn" style="flex:0 0 auto; padding: 8px 14px;">✕</button>
  </div>

  <div id="bottomBar">
    <div class="speed-row">
      <span>Tempo</span>
      <input type="range" id="speedSlider" min="0" max="150" value="40" style="flex:1;">
      <span id="speedVal">40</span>
    </div>
    <div class="btn-row">
      <button class="ctrl rec" id="recBtn">● Aufnahme</button>
      <button class="ctrl del" id="delBtn" disabled>↶ Letztes verwerfen</button>
      <button class="ctrl stop" id="finishBtn" disabled>✓ Fertig</button>
    </div>
  </div>
</div>

<!-- ===== FINISH ===== -->
<div id="finish">
  <h1>✓ Fertig</h1>
  <video id="previewVideo" controls></video>
  <button class="btn" id="downloadBtn">Video herunterladen</button>
  <button class="btn secondary" id="restartBtn">Neu aufnehmen</button>
</div>

<script>
// ===== DOM =====
const $ = id => document.getElementById(id);
const setup = $('setup'), prompter = $('prompter'), finish = $('finish');
const video = $('video'), textScroll = $('textScroll');

// ===== State =====
let stream = null;
let mediaRecorder = null;
let recordedSegments = []; // { blob, textPosAtStart }
let currentChunks = [];
let isRecording = false;
let mimeType = '';

let scrollY = 0;         // aktuelle Text-Position (px)
let scrollSpeed = 40;    // px/s
let currentAnim = null;  // laufende Web Animation
let animStartY = 0;
let animStartTime = 0;

// ===== Setup UI =====
$('fontSize').oninput = e => $('fontSizeVal').textContent = e.target.value + ' px';
$('startSpeed').oninput = e => $('startSpeedVal').textContent = e.target.value + ' px/s';

$('startBtn').onclick = async () => {
  const text = $('scriptText').value.trim();
  if (!text) { alert('Bitte Text eingeben.'); return; }

  const fontSize = $('fontSize').value;
  scrollSpeed = parseInt($('startSpeed').value);
  const camFacing = $('camSelect').value;

  textScroll.textContent = text;
  textScroll.style.fontSize = fontSize + 'px';

  $('speedSlider').value = scrollSpeed;
  $('speedVal').textContent = scrollSpeed;

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: camFacing, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: true
    });
    video.srcObject = stream;
    video.classList.toggle('back', camFacing === 'environment');

    // Video-Watchdog: falls der Browser die Preview drosselt oder pausiert,
    // sofort wieder starten. Auch bei Sichtbarkeits-/Fokuswechseln.
    const ensurePlaying = () => {
      if (video.paused || video.readyState < 2) {
        video.play().catch(() => {});
      }
    };
    video.addEventListener('pause', ensurePlaying);
    video.addEventListener('stalled', ensurePlaying);
    video.addEventListener('suspend', ensurePlaying);
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) ensurePlaying();
    });
    // Sicherheitsnetz: alle 2s prüfen
    window._playWatchdog = setInterval(ensurePlaying, 2000);

    // Startposition: Text beginnt auf Lesezeile (Mitte Overlay)
    const overlay = $('textOverlay');
    setScrollY(overlay.clientHeight / 2);

    setup.style.display = 'none';
    prompter.style.display = 'block';
    pickMimeType();
  } catch (err) {
    alert('Kamera-Zugriff fehlgeschlagen: ' + err.message);
  }
};

// ===== Mime Type Detection =====
function pickMimeType() {
  const candidates = [
    'video/webm;codecs=vp9,opus',
    'video/webm;codecs=vp8,opus',
    'video/webm',
    'video/mp4'
  ];
  mimeType = candidates.find(t => MediaRecorder.isTypeSupported(t)) || '';
}

// ===== Scroll via Web Animations API (läuft auf Compositor-Thread) =====
function stopAnim() {
  if (currentAnim) {
    // aktuelle Position einfrieren
    scrollY = getCurrentScrollY();
    currentAnim.cancel();
    currentAnim = null;
  }
  textScroll.style.transform = `translate3d(0, ${scrollY}px, 0)`;
}

function getCurrentScrollY() {
  if (!currentAnim) return scrollY;
  const elapsed = (performance.now() - animStartTime) / 1000;
  return animStartY - scrollSpeed * elapsed;
}

function startAnim() {
  stopAnim();
  // Sehr weit nach oben animieren; wir stoppen manuell bei Pause
  const distance = 100000; // px
  const durationMs = (distance / scrollSpeed) * 1000;
  animStartY = scrollY;
  animStartTime = performance.now();
  currentAnim = textScroll.animate(
    [
      { transform: `translate3d(0, ${scrollY}px, 0)` },
      { transform: `translate3d(0, ${scrollY - distance}px, 0)` }
    ],
    { duration: durationMs, easing: 'linear', fill: 'forwards' }
  );
}

function setScrollY(y) {
  stopAnim();
  scrollY = y;
  textScroll.style.transform = `translate3d(0, ${scrollY}px, 0)`;
}

// ===== Speed control =====
$('speedSlider').oninput = e => {
  scrollSpeed = parseInt(e.target.value);
  $('speedVal').textContent = scrollSpeed;
  if (isRecording && scrollSpeed > 0) {
    startAnim(); // mit neuer Geschwindigkeit ab aktueller Position
  } else {
    stopAnim();
  }
};

// ===== Recording =====
$('recBtn').onclick = () => {
  if (isRecording) pauseRecording();
  else startRecording();
};

function startRecording() {
  currentChunks = [];
  const opts = mimeType ? { mimeType } : {};
  try {
    mediaRecorder = new MediaRecorder(stream, opts);
  } catch (e) {
    mediaRecorder = new MediaRecorder(stream);
  }
  const segmentStartY = scrollY;

  mediaRecorder.ondataavailable = e => {
    if (e.data && e.data.size > 0) currentChunks.push(e.data);
  };
  mediaRecorder.onstop = () => {
    const blob = new Blob(currentChunks, { type: mediaRecorder.mimeType || mimeType || 'video/webm' });
    recordedSegments.push({ blob, textPosAtStart: segmentStartY });
    updateUI();
  };

  mediaRecorder.start();
  isRecording = true;
  if (scrollSpeed > 0) startAnim();
  $('recDot').classList.add('active');
  $('recBtn').textContent = '❚❚ Pause';
  $('recBtn').classList.remove('rec');
  $('delBtn').disabled = true;
  $('finishBtn').disabled = true;
  $('backBtn').disabled = true;
}

function pauseRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  stopAnim();
  isRecording = false;
  $('recDot').classList.remove('active');
  $('recBtn').textContent = '● Weiter';
  $('recBtn').classList.add('rec');
  $('backBtn').disabled = false;
}

function updateUI() {
  const n = recordedSegments.length;
  $('segCount').textContent = n + (n === 1 ? ' Segment' : ' Segmente');
  $('delBtn').disabled = n === 0 || isRecording;
  $('finishBtn').disabled = n === 0 || isRecording;
}

// ===== Letztes Segment verwerfen + Text zurückspringen =====
$('delBtn').onclick = () => {
  if (recordedSegments.length === 0) return;
  if (!confirm('Letztes Segment verwerfen? Der Text springt zurück zur Stelle vor der letzten Aufnahme.')) return;
  const last = recordedSegments.pop();
  setScrollY(last.textPosAtStart);
  updateUI();
};

// ===== Fertig =====
$('finishBtn').onclick = async () => {
  if (recordedSegments.length === 0) return;
  stopAnim();
  if (window._playWatchdog) { clearInterval(window._playWatchdog); window._playWatchdog = null; }
  stream.getTracks().forEach(t => t.stop());

  // Segmente zusammenfügen (einfache Blob-Konkatenation funktioniert bei webm/mp4 mit gleichem Codec meistens)
  const allBlobs = recordedSegments.map(s => s.blob);
  const finalBlob = new Blob(allBlobs, { type: allBlobs[0].type });
  const url = URL.createObjectURL(finalBlob);

  $('previewVideo').src = url;
  prompter.style.display = 'none';
  finish.style.display = 'flex';

  $('downloadBtn').onclick = () => {
    const a = document.createElement('a');
    a.href = url;
    const ext = finalBlob.type.includes('mp4') ? 'mp4' : 'webm';
    a.download = `teleprompter-${Date.now()}.${ext}`;
    a.click();
  };
};

// ===== Abbrechen / Neustart =====
$('backBtn').onclick = () => {
  if (isRecording) return;
  if (recordedSegments.length > 0 && !confirm('Aufnahme abbrechen? Alle Segmente gehen verloren.')) return;
  cleanupAndReset();
};
$('restartBtn').onclick = cleanupAndReset;

function cleanupAndReset() {
  stopAnim();
  if (window._playWatchdog) { clearInterval(window._playWatchdog); window._playWatchdog = null; }
  if (stream) stream.getTracks().forEach(t => t.stop());
  recordedSegments = [];
  isRecording = false;
  finish.style.display = 'none';
  prompter.style.display = 'none';
  setup.style.display = 'flex';
  $('recDot').classList.remove('active');
  $('recBtn').textContent = '● Aufnahme';
}
</script>
</body>
</html>
